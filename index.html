<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="The latest original articles and editorials from Mainspring News — watch news wound for enthusiasts.">

    <link rel="icon" href="favicon.ico?v=2" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="coil-icon.png?v=2">
    <link rel="apple-touch-icon" href="coil-icon.png?v=2">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="site.css">

    <!-- ═══ Google AdSense ═══ -->
    <!-- TODO: Replace ca-pub-XXXXXXXXXXXXXXXX with your actual publisher ID -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

    <style>
        /* ═══════════════════════════════════
           Latest Page — Page-Specific CSS
           ═══════════════════════════════════ */
        .latest-wrapper {
            max-width: 1320px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── Section Eyebrow label ── */
        .section-eyebrow {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .section-eyebrow::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Hero ── */
        .hero-section { margin-bottom: 36px; }

        .hero-link {
            display: block;
            text-decoration: none;
            border-radius: 14px;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
        }

        .hero-link:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-hover);
            transform: translateY(-3px);
        }

        .hero-image-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 21 / 9;
            overflow: hidden;
            background: #101214;
        }

        .hero-image-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.85);
            transition: transform 0.5s ease;
            display: block;
        }

        .hero-link:hover .hero-image-wrap img { transform: scale(1.03); }

        .hero-placeholder {
            position: absolute;
            inset: 0;
            background: #14161A;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-placeholder img {
            height: 40%;
            width: auto;
            opacity: 0.35;
            mix-blend-mode: screen;
            filter: brightness(0.7);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 45%, rgba(10,11,13,0.55) 100%);
            pointer-events: none;
        }

        .hero-badge {
            position: absolute;
            top: 16px; left: 16px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            background: var(--gold);
            color: var(--bg);
            padding: 5px 11px;
            border-radius: 4px;
        }

        .hero-body { padding: 28px 32px 32px; }

        .hero-title {
            font-family: 'Cinzel', Georgia, serif;
            font-size: clamp(1.5rem, 3vw, 2.4rem);
            font-weight: 500;
            line-height: 1.25;
            color: var(--text);
            margin-bottom: 14px;
            letter-spacing: -0.01em;
        }

        .hero-excerpt {
            font-size: 15px;
            line-height: 1.75;
            color: var(--text-muted);
            margin-bottom: 18px;
            max-width: 700px;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .hero-date, .hero-read {
            font-size: 11px;
            color: #86868B;
            letter-spacing: 0.04em;
        }

        .hero-sep { color: var(--border); font-size: 11px; }

        .hero-cta {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* ── Ad slots ── */
        .ad-slot { margin: 0 0 36px; }
        .ad-slot-sidebar {
            grid-column: 3;
            grid-row: 1 / 3;
        }

        /* ── Skeleton Loading ── */
        .skeleton-hero {
            background: var(--surface);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 36px;
        }

        .skeleton-hero-img {
            width: 100%;
            aspect-ratio: 21 / 9;
            background: var(--skeleton);
            animation: pulse 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
        }

        .skeleton-hero-body { padding: 28px 32px; }

        .skeleton-line {
            height: 14px;
            border-radius: 6px;
            background: var(--skeleton);
            animation: pulse 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
            margin-bottom: 12px;
        }

        .skeleton-line.xl    { width: 80%; height: 34px; }
        .skeleton-line.med   { width: 58%; }
        .skeleton-line.short { width: 32%; height: 10px; margin-top: 6px; }

        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        .skeleton-card {
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .skeleton-card-img {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--skeleton);
            animation: pulse 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
        }

        .skeleton-card-body { padding: 16px; }

        /* ── Responsive (page-specific) ── */
        @media (max-width: 1024px) { .skeleton-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; } }

        @media (max-width: 640px) {
            .latest-wrapper    { padding: 24px 16px 60px; }
            .hero-image-wrap   { aspect-ratio: 16 / 9; }
            .hero-body         { padding: 18px 18px 22px; }
            .skeleton-grid     { grid-template-columns: 1fr; gap: 14px; }
            .skeleton-hero-img { aspect-ratio: 16 / 9; }
            .skeleton-hero-body{ padding: 18px; }
        }
    </style>
</head>
<body>

    <!-- ═══ Header ═══ -->
    <header class="site-header">
        <div class="logo-group">
            <a href="index.html">
                <img class="logo-img" src="https://mainspring.news/full-logo.png" alt="Mainspring News">
            </a>
        </div>
        <p class="tagline">Watch News and More, Wound for Enthusiasts</p>
        <nav class="site-nav">
            <a class="nav-link" href="index.html">Latest</a>
            <a class="nav-link" href="news.html">News</a>
            <a class="nav-link" href="reviews.html">Reviews</a>
            <a class="nav-link" href="polls.html">Polls</a>
        </nav>
        <hr class="header-border">
    </header>

    <!-- ═══ Main ═══ -->
    <main>
        <div class="latest-wrapper">

            <!-- Skeleton (visible while content.json loads) -->
            <div id="contentSkeleton">
                <div class="skeleton-hero">
                    <div class="skeleton-hero-img"></div>
                    <div class="skeleton-hero-body">
                        <div class="skeleton-line xl"></div>
                        <div class="skeleton-line med"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                </div>
                <div class="skeleton-grid">
                    <div class="skeleton-card"><div class="skeleton-card-img"></div><div class="skeleton-card-body"><div class="skeleton-line"></div><div class="skeleton-line med"></div></div></div>
                    <div class="skeleton-card"><div class="skeleton-card-img"></div><div class="skeleton-card-body"><div class="skeleton-line"></div><div class="skeleton-line med"></div></div></div>
                    <div class="skeleton-card"><div class="skeleton-card-img"></div><div class="skeleton-card-body"><div class="skeleton-line"></div><div class="skeleton-line med"></div></div></div>
                </div>
            </div>

            <!-- Hero (featured article injected by content.js) -->
            <div id="contentHero"></div>

            <!-- Ad Slot — Below Hero -->
            <div class="ad-placeholder ad-slot" id="ad-latest-hero">
                <!-- INSERT ADSENSE IN-FEED UNIT HERE -->
                <span class="ad-label">Advertisement</span>
            </div>

            <!-- More Articles grid -->
            <p class="section-eyebrow">More Articles</p>
            <div class="articles-grid" id="contentGrid"></div>

        </div>
    </main>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop" aria-label="Back to top">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <!-- ═══ Footer ═══ -->
    <footer class="site-footer">
        <div class="footer-links">
            <a class="footer-link" href="watch-terms.html">Watch Terms</a>
            <span class="footer-link-sep">&middot;</span>
            <a class="footer-link" href="about.html">About</a>
            <span class="footer-link-sep">&middot;</span>
            <a class="footer-link" href="privacy.html">Privacy</a>
            <span class="footer-link-sep">&middot;</span>
            <a class="footer-link" href="mailto:mainspring.watchnews@gmail.com?subject=Inquiry from Mainspring News" target="_blank" rel="noopener noreferrer">Contact</a>
        </div>
        <p class="footer-disclosure">This site uses Google AdSense to display advertisements.</p>
        <p class="footer-copy">&copy; 2026 Mainspring News. All article content belongs to its respective publishers.</p>
    </footer>

    <script src="content.js"></script>
    <script>
        // Back to top
        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            backToTopBtn.classList.toggle('visible', window.scrollY > 400);
        }, { passive: true });
        backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        // Render LATEST — pulls type:'article' items from content.json
        renderContentPage('article');
    </script>
</body>
</html>
