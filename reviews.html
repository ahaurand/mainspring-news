    <style>
        /* ═══════════════════════════════════
           Reviews Page — Page-Specific CSS
           (mirrors index.html exactly)
           ═══════════════════════════════════ */
        .latest-wrapper {
            max-width: 1320px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        .section-eyebrow {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .section-eyebrow::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Hero (horizontal card — 1/3 image | 2/3 text) ── */
        .hero-section { margin-bottom: 36px; }

        .hero-link {
            display: flex;
            flex-direction: row;
            text-decoration: none;
            border-radius: 10px;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
        }

        .hero-link:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-hover);
            transform: translateY(-4px);
        }

        /* ── Left: image panel (1/3 width) ── */
        .hero-image-wrap {
            flex: 0 0 33.333%;
            position: relative;
            overflow: hidden;
            background: #101214;
        }

        .hero-image-wrap img {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.9);
            transition: transform 0.4s ease;
            display: block;
        }

        .hero-link:hover .hero-image-wrap img { transform: scale(1.04); }

        .hero-placeholder {
            position: absolute;
            inset: 0;
            background: #14161A;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-placeholder img {
            height: 40%; width: auto;
            opacity: 0.35;
            mix-blend-mode: screen;
            filter: brightness(0.7);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent 60%, rgba(10,11,13,0.3) 100%);
            pointer-events: none;
        }

        .hero-badge {
            position: absolute;
            top: 10px; left: 10px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: rgba(10, 11, 13, 0.82);
            color: var(--gold);
            padding: 4px 9px;
            border-radius: 4px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(212, 175, 55, 0.12);
            z-index: 2;
        }

        /* ── Right: text panel (2/3 width) ── */
        .hero-body {
            flex: 1;
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-title {
            font-family: 'Cinzel', Georgia, serif;
            font-size: clamp(1.1rem, 1.8vw, 1.6rem);
            font-weight: 600;
            line-height: 1.3;
            color: var(--text);
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        .hero-excerpt {
            font-size: 13.5px;
            line-height: 1.7;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .hero-date, .hero-read { font-size: 10px; color: #86868B; letter-spacing: 0.04em; }
        .hero-sep              { color: var(--border); font-size: 10px; }

        .hero-cta {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .ad-slot { margin: 0 0 36px; }

        /* ── Skeleton Loading ── */
        .skeleton-hero {
            display: flex;
            flex-direction: row;
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 36px;
        }

        .skeleton-hero-img {
            flex: 0 0 33.333%;
            background: var(--skeleton);
            animation: pulse 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
            min-height: 220px;
        }

        .skeleton-hero-body {
            flex: 1;
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 14px;
        }

        .skeleton-line {
            height: 14px;
            border-radius: 6px;
            background: var(--skeleton);
            animation: pulse 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
        }

        .skeleton-line.xl    { width: 80%; height: 24px; }
        .skeleton-line.med   { width: 58%; }
        .skeleton-line.short { width: 32%; height: 10px; }

        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        .skeleton-card {
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .skeleton-card-img {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--skeleton);
            animation: pulse 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
        }

        .skeleton-card-body { padding: 16px; }

        /* ── Responsive (page-specific) ── */
        @media (max-width: 1024px) { .skeleton-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; } }

        @media (max-width: 768px) {
            .hero-link         { flex-direction: column; }
            .hero-image-wrap   { flex: none; width: 100%; aspect-ratio: 16 / 9; }
            .skeleton-hero     { flex-direction: column; }
            .skeleton-hero-img { flex: none; width: 100%; aspect-ratio: 16 / 9; min-height: 0; }
        }

        @media (max-width: 640px) {
            .latest-wrapper     { padding: 24px 16px 60px; }
            .hero-body          { padding: 18px; }
            .skeleton-grid      { grid-template-columns: 1fr; gap: 14px; }
            .skeleton-hero-body { padding: 18px; }
        }
    </style>
</head>
<body>
